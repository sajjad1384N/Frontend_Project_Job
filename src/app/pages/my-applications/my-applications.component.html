<section>
  <h1>My applications</h1>
  <div class="filters card">
    <input [(ngModel)]="keyword" placeholder="Job / company" />
    <select [(ngModel)]="statusFilter">
      <option value="">All statuses</option>
      <option value="APPLIED">Applied</option>
      <option value="SHORTLISTED">Shortlisted</option>
      <option value="REJECTED">Rejected</option>
    </select>
    <button type="button" class="btn primary" (click)="search()">Filter</button>
  </div>

  @if (error()) {
    <div class="alert error">{{ error() }}</div>
  }
  @if (loading()) {
    <p>Loading…</p>
  } @else if (!list().length) {
    <div class="card empty">No applications yet.</div>
  } @else {
    <div class="card list">
      @for (a of list(); track a.id) {
        <article class="row">
          <div>
            <a [routerLink]="['/jobs', a.jobId]">{{ a.jobTitle }}</a>
            <span class="badge" [class]="'st-' + a.status.toLowerCase()">{{ a.status }}</span>
          </div>
          <p class="muted small">{{ a.appliedAt | date: 'medium' }}</p>
        </article>
      }
    </div>
    <div class="pagination">
      <button type="button" class="btn ghost" [disabled]="page() === 0" (click)="prev()">Previous</button>
      <span class="muted">Page {{ page() + 1 }} / {{ totalPages() || 1 }}</span>
      <button type="button" class="btn ghost" [disabled]="page() >= totalPages() - 1" (click)="next()">
        Next
      </button>
    </div>
  }
</section>
