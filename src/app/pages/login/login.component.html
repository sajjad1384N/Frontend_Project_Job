<section class="narrow">
  <h1>Log in</h1>
  @if (infoMessage()) {
    <div class="alert info" role="status">{{ infoMessage() }}</div>
  }
  @if (error()) {
    <div class="alert error">{{ error() }}</div>
  }
  <form class="card form" (ngSubmit)="submit()">
    <label>
      Email
      <input type="email" name="email" [(ngModel)]="email" required />
    </label>
    <label>
      Password
      <input type="password" name="password" [(ngModel)]="password" required />
    </label>
    <button type="submit" class="btn primary" [disabled]="loading()">{{ loading() ? '…' : 'Log in' }}</button>
  </form>
  <p class="muted">
    <a routerLink="/forgot-password">Forgot password?</a>
    · No account? <a routerLink="/register">Register</a>
  </p>
</section>
