<section class="narrow">
  <h1>Create account</h1>
  @if (error()) {
    <div class="alert error">{{ error() }}</div>
  }
  <form class="card form" (ngSubmit)="submit()">
    <label>
      Full name
      <input name="fullName" [(ngModel)]="fullName" required />
    </label>
    <label>
      Email
      <input type="email" name="email" [(ngModel)]="email" required />
    </label>
    <label>
      Password
      <input type="password" name="password" [(ngModel)]="password" required />
    </label>
    <label>
      Role
      <select name="role" [(ngModel)]="role">
        @for (r of roles; track r) {
          <option [ngValue]="r">{{ r }}</option>
        }
      </select>
    </label>
    <button type="submit" class="btn primary" [disabled]="loading()">{{ loading() ? '…' : 'Register' }}</button>
  </form>
  <p class="muted">Already have an account? <a routerLink="/login">Log in</a></p>
</section>
