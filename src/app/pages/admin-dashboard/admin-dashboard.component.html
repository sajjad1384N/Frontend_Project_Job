<section>
  <h1>Admin dashboard</h1>
  @if (error()) {
    <div class="alert error">{{ error() }}</div>
  }
  @if (loading()) {
    <p>Loading…</p>
  } @else {
    @if (stats(); as s) {
      <div class="stats">
        <div class="stat card"><strong>{{ s.totalUsers }}</strong><span>Users</span></div>
        <div class="stat card"><strong>{{ s.totalJobs }}</strong><span>Jobs</span></div>
        <div class="stat card"><strong>{{ s.totalApplications }}</strong><span>Applications</span></div>
        <div class="stat card"><strong>{{ s.totalApplied }}</strong><span>Applied</span></div>
        <div class="stat card"><strong>{{ s.totalShortlisted }}</strong><span>Shortlisted</span></div>
        <div class="stat card"><strong>{{ s.totalRejected }}</strong><span>Rejected</span></div>
      </div>
    }
  }
</section>
